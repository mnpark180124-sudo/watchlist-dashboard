name: Update Stock Watchlist

on:
  schedule:
    - cron: "*/15 0-6 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name "watchlist-bot"
          git config user.email "actions@github.com"
          git add data/stocks.json data/macro.json
          git diff --staged --quiet || git commit -m "chore: update stock data"
          git push
